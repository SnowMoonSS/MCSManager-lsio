name: Release Docker Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'MCSManager release tag (e.g., v1.2.3)'
        required: true
        type: string
  repository_dispatch:
    types: [release]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta web
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: |
            name=ghcr.io/${{ github.repository_owner }}/mcsm-web
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Web
        uses: docker/build-push-action@v6
        with:
          file: web.dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          build-args: |
            BUILDPLATFORM=linux/amd64
            MCSM_VERSION=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }}

  build-daemon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        java_version: ['none', 8, 11, 17, 21, 25]

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta daemon
        id: meta_daemon
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/mcsm-daemon
          tags: |
            type=raw,value=latest,enable=${{ matrix.java_version == 'none' }}
            type=raw,value=latest,suffix=-jre${{ matrix.java_version }},enable=${{ matrix.java_version != 'none' }}
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }},enable=${{ matrix.java_version == 'none' }}
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }},suffix=-jre${{ matrix.java_version }},enable=${{ matrix.java_version != 'none' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }},enable=${{ matrix.java_version == 'none' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }},suffix=-jre${{ matrix.java_version }},enable=${{ matrix.java_version != 'none' }}
            type=semver,pattern={{major}},value=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }},enable=${{ matrix.java_version == 'none' }}
            type=semver,pattern={{major}},value=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }},suffix=-jre${{ matrix.java_version }},enable=${{ matrix.java_version != 'none' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Daemon
        uses: docker/build-push-action@v6
        with:
          file: daemon.dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_daemon.outputs.tags }}
          labels: ${{ steps.meta_daemon.outputs.labels }}
          build-args: |
            BUILDPLATFORM=linux/amd64
            EMBEDDED_JAVA_VERSION=${{ matrix.java_version }}
            MCSM_VERSION=${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }}
